<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ali & Manar Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Amiri&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

font-family:'Cinzel',serif;

background:radial-gradient(circle at top,#1b2735,#090a0f);

overflow:hidden;
color:white;

}

/* moon */

.moon{

position:absolute;
top:80px;
right:120px;

font-size:140px;

color:#FFD700;

opacity:.9;

}

/* mosque silhouette */

.mosque{

position:absolute;

bottom:0;
left:0;

width:100%;

height:200px;

background:linear-gradient(to top,rgba(0,0,0,.9),transparent);

opacity:.5;

}

/* stars */

.star{

position:absolute;

width:3px;
height:3px;

background:#FFD700;

border-radius:50%;

animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%,100%{opacity:.2}
50%{opacity:1}

}

/* invitation card */

.container{

text-align:center;

max-width:900px;
width:92%;

padding:60px 40px;

border-radius:25px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(14px);

box-shadow:0 0 80px rgba(0,0,0,.8);

animation:fade 2s;

}

@keyframes fade{

from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}

}

/* ayah */

.ayah{

font-family:'Amiri',serif;

direction:rtl;

font-size:26px;

line-height:1.8;

color:#FFD700;

margin-bottom:35px;

}

/* title */

.title{

font-family:'Great Vibes',cursive;

font-size:70px;

color:#FFD700;

margin-bottom:10px;

}

/* names */

.names{

font-size:52px;

margin:15px 0;

}

.symbol{

font-size:42px;
color:#FFD700;

}

/* details */

.details{

margin-top:25px;

font-size:22px;

}

.date{

color:#FFD700;

font-size:26px;

}

.location{

margin-top:10px;

}

/* map button */

.map-btn{

margin-top:25px;

display:inline-block;

padding:14px 35px;

background:#FFD700;

color:#000;

border-radius:30px;

font-weight:bold;

text-decoration:none;

transition:.3s;

}

.map-btn:hover{

transform:scale(1.1);

}

/* countdown */

.countdown{

margin-top:40px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.box{

background:rgba(255,255,255,.08);

padding:18px 22px;

border-radius:10px;

}

.box span{

font-size:32px;

color:#FFD700;

display:block;

}

.footer{

margin-top:30px;

font-size:18px;

opacity:.8;

}

/* mobile */

@media(max-width:768px){

.title{font-size:45px}
.names{font-size:32px}
.ayah{font-size:20px}

}

</style>

</head>

<body>

<div class="moon">☾</div>

<div class="container">

<div class="ayah">

وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً

</div>

<div class="title">Wedding Invitation</div>

<div class="names">

Ali <span class="symbol">☾</span> Manar

</div>

<div class="details">

<div class="date">

11 April 2026

</div>

<div class="location">

Salamlek Hall<br>
Tulip Hotel – Beni Suef

</div>

<a class="map-btn"
href="https://maps.app.goo.gl/A78TEz82DF5F8LFc7"
target="_blank">

View Location

</a>

</div>

<div class="countdown">

<div class="box"><span id="days">0</span>Days</div>
<div class="box"><span id="hours">0</span>Hours</div>
<div class="box"><span id="minutes">0</span>Minutes</div>
<div class="box"><span id="seconds">0</span>Seconds</div>

</div>

<div class="footer">

نسعد بحضوركم ومشاركتكم فرحتنا

</div>

</div>

<div class="mosque"></div>

<audio autoplay loop>

<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9a1c5f6f03.mp3" type="audio/mp3">

</audio>

<script>

/* countdown */

const weddingDate=new Date("April 11, 2026 19:00:00").getTime();

setInterval(()=>{

const now=new Date().getTime();

const distance=weddingDate-now;

document.getElementById("days").innerHTML=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerHTML=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerHTML=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerHTML=Math.floor((distance%(1000*60))/1000);

},1000);

/* stars */

for(let i=0;i<90;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

star.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(star);

}

</script>

</body>
</html>
