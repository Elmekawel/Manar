<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ali & Manar Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Amiri&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Cinzel',serif;

background:radial-gradient(circle at top,#1b2735,#090a0f);

color:white;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

}

/* opening screen */

.open-screen{

position:absolute;

width:100%;
height:100%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:#090a0f;

z-index:10;

}

.open-btn{

margin-top:30px;

padding:15px 40px;

background:#FFD700;

border:none;

font-size:20px;

border-radius:40px;

cursor:pointer;

transition:.3s;

}

.open-btn:hover{

transform:scale(1.1);

}

/* ring animation */

.ring{

font-size:90px;

color:#FFD700;

margin-top:20px;

animation:ring 2s infinite;

}

@keyframes ring{

0%{transform:rotate(-10deg)}
50%{transform:rotate(10deg)}
100%{transform:rotate(-10deg)}

}

/* stars */

.star{

position:absolute;

width:2px;
height:2px;

background:#FFD700;

border-radius:50%;

animation:twinkle 4s infinite;

}

@keyframes twinkle{

0%,100%{opacity:.2}
50%{opacity:1}

}

/* moon */

.moon{

position:absolute;

top:80px;
right:120px;

font-size:140px;

color:#FFD700;

}

/* card */

.container{

display:none;

text-align:center;

width:92%;
max-width:900px;

padding:60px 40px;

border-radius:25px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

box-shadow:0 0 80px rgba(0,0,0,.8);

}

/* ayah */

.ayah{

font-family:'Amiri',serif;

direction:rtl;

font-size:26px;

line-height:1.8;

color:#FFD700;

margin-bottom:40px;

}

/* title */

.title{

font-family:'Great Vibes',cursive;

font-size:70px;

color:#FFD700;

}

/* names */

.names{

font-size:55px;

margin:25px 0;

border:2px solid rgba(255,215,0,.4);

padding:20px;

border-radius:15px;

}

/* details */

.date{

font-size:26px;

color:#FFD700;

margin-top:10px;

}

.map-btn{

margin-top:20px;

display:inline-block;

padding:14px 35px;

background:#FFD700;

color:black;

border-radius:30px;

font-weight:bold;

text-decoration:none;

}

/* countdown */

.countdown{

margin-top:40px;

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.box{

background:rgba(255,255,255,.08);

padding:18px 22px;

border-radius:10px;

}

.box span{

font-size:32px;

color:#FFD700;

display:block;

}

/* mobile */

@media(max-width:768px){

.title{font-size:45px}
.names{font-size:32px}
.ayah{font-size:20px}

}

</style>

</head>

<body>

<!-- opening screen -->

<div class="open-screen" id="openScreen">

<h1 style="font-family:Great Vibes;font-size:60px;color:#FFD700">

Ali & Manar

</h1>

<div class="ring">💍</div>

<button class="open-btn" onclick="openInvitation()">

Open Invitation

</button>

</div>


<div class="moon">☾</div>

<!-- invitation -->

<div class="container" id="invitation">

<div class="ayah">

وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً

</div>

<div class="title">

Wedding Invitation

</div>

<div class="names">

Ali ☾ Manar

</div>

<div class="date">

11 April 2026

</div>

<div>

Salamlek Hall<br>
Tulip Hotel – Beni Suef

</div>

<a class="map-btn"
href="https://maps.app.goo.gl/A78TEz82DF5F8LFc7"
target="_blank">

View Location

</a>

<div class="countdown">

<div class="box"><span id="days"></span>Days</div>
<div class="box"><span id="hours"></span>Hours</div>
<div class="box"><span id="minutes"></span>Minutes</div>
<div class="box"><span id="seconds"></span>Seconds</div>

</div>

</div>

<script>

/* open animation */

function openInvitation(){

document.getElementById("openScreen").style.display="none";

document.getElementById("invitation").style.display="block";

}

/* countdown */

const weddingDate=new Date("April 11, 2026 19:00:00").getTime();

setInterval(()=>{

const now=new Date().getTime();

const distance=weddingDate-now;

document.getElementById("days").innerHTML=Math.floor(distance/(1000*60*60*24));
document.getElementById("hours").innerHTML=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerHTML=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerHTML=Math.floor((distance%(1000*60))/1000);

},1000);


/* stars */

for(let i=0;i<120;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

document.body.appendChild(star);

}

</script>

</body>
</html>
