<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali & Manar Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    height:100vh;
    font-family:'Cinzel', serif;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#1a1a2e,#162447,#1f4068);
    overflow:hidden;
    color:white;
}

.container {
    text-align:center;
    max-width:900px;
    padding:60px 40px;
    border-radius:25px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 60px rgba(0,0,0,0.7);
    position: relative;
    animation:fadeIn 2s;
}

@keyframes fadeIn { from{opacity:0;transform:translateY(50px)} to{opacity:1;transform:translateY(0);} }

.title {
    font-family:'Great Vibes', cursive;
    font-size: 80px;
    color:#FFD700;
    margin-bottom:10px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    animation:textPop 1s ease forwards;
}
@keyframes textPop { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }

.subtitle {
    font-size:24px;
    letter-spacing:3px;
    color: #f5f5f5;
    margin-bottom:40px;
    opacity:0.9;
}

.names {
    font-size:55px;
    margin:20px 0;
    color:#fff;
    position: relative;
}

.heart {
    font-size:40px;
    color:#FFD700;
    animation:beat 1.5s infinite;
    margin:0 10px;
}

@keyframes beat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.3);} }

.details { margin-top:30px; font-size:22px; line-height:1.8; }

.date { color:#FFD700; font-size:28px; margin-top:10px; }

.location { margin-top:10px; font-size:20px; }

.map-btn {
    margin-top:25px;
    display:inline-block;
    padding:16px 40px;
    background:#FFD700;
    color:#000;
    border-radius:35px;
    font-weight:bold;
    font-size:18px;
    text-decoration:none;
    transition:0.3s;
}
.map-btn:hover { transform:scale(1.1); }

.countdown {
    margin-top:50px;
    display:flex;
    justify-content:center;
    gap:25px;
}

.box {
    background:rgba(255,255,255,0.08);
    padding:20px 25px;
    border-radius:15px;
    min-width:90px;
}

.box span { font-size:38px; display:block; color:#FFD700; }
.box small { font-size:14px; opacity:0.8; }

.footer { margin-top:50px; font-size:18px; opacity:0.7; }

.particles {
    position:absolute;
    top:0; left:0; width:100%; height:100%;
    pointer-events:none;
    overflow:hidden;
}

.particle {
    position:absolute;
    width:6px;
    height:6px;
    background:#FFD700;
    border-radius:50%;
    opacity:0.7;
    animation:float 15s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity:0; }
    10% { opacity:0.8; }
    90% { opacity:0.8; }
    100% { transform: translateY(-50px) translateX(100px) rotate(360deg); opacity:0; }
}
</style>
</head>
<body>

<div class="container">
<div class="title">Wedding Invitation</div>
<div class="subtitle">We Are Getting Married</div>

<div class="names">
Ali <span class="heart">❤</span> Manar
</div>

<div class="details">
<div class="date">11 April 2026</div>
<div class="location">Salamlek Hall<br>Tulip Hotel – Beni Suef</div>
<a class="map-btn" href="https://maps.app.goo.gl/A78TEz82DF5F8LFc7" target="_blank">View Location</a>
</div>

<div class="countdown">
<div class="box"><span id="days">0</span><small>Days</small></div>
<div class="box"><span id="hours">0</span><small>Hours</small></div>
<div class="box"><span id="minutes">0</span><small>Minutes</small></div>
<div class="box"><span id="seconds">0</span><small>Seconds</small></div>
</div>

<div class="footer">We would be honored by your presence to celebrate our special day</div>
</div>

<div class="particles" id="particles"></div>

<script>
// Countdown Timer
const weddingDate = new Date("April 11, 2026 19:00:00").getTime();
setInterval(() => {
    const now = new Date().getTime();
    const distance = weddingDate - now;
    const days = Math.floor(distance/(1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds = Math.floor((distance%(1000*60))/1000);
    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;
}, 1000);

// Golden particles
function createParticle() {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random()*100+'%';
    particle.style.animationDuration = (Math.random()*10+10)+'s';
    particle.style.width = particle.style.height = (Math.random()*4 + 3)+'px';
    document.getElementById('particles').appendChild(particle);
    setTimeout(()=>particle.remove(),15000);
}
setInterval(createParticle, 200);
for(let i=0;i<50;i++){setTimeout(createParticle,i*100);}
</script>

</body>
</html>
